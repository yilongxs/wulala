<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>井字遊戲</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; border: 1px solid #333; font-size: 2em; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cell:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>井字遊戲</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <p id="status">輪到 X</p>
    <button onclick="resetGame()">重新開始</button>

    <script>
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        const cells = document.querySelectorAll('.cell');

        function makeMove(index) {
            if (!board[index]) {
                board[index] = currentPlayer;
                cells[index].innerText = currentPlayer;
                if (checkWinner()) {
                    document.getElementById('status').innerText = `玩家 ${currentPlayer} 獲勝！`;
                    return;
                }
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('status').innerText = `輪到 ${currentPlayer}`;
            }
        }

        function checkWinner() {
            const lines = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            return lines.some(line => {
                const [a, b, c] = line;
                return board[a] && board[a] === board[b] && board[a] === board[c];
            });
        }

        function resetGame() {
            board.fill(null);
            cells.forEach(c => c.innerText = '');
            currentPlayer = 'X';
            document.getElementById('status').innerText = '輪到 X';
        }
    </script>
</body>
</html>
